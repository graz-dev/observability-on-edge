apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hub-obs
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.hub-obs.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: jaeger

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.hub-obs.svc.cluster.local:3100
        editable: true
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceUid: jaeger
              matcherRegex: "trace_id\"?:\\s?\"?([\\w]+)"
              name: TraceID
              url: "$${__value.raw}"

      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.hub-obs.svc.cluster.local:16686
        uid: jaeger
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            filterBySpanID: false
            customQuery: false
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
          serviceMap:
            datasourceUid: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: hub-obs
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
